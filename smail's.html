<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Match Predictor"/>
<meta name="theme-color" content="#1a7a3c"/>
<title>Football Match Predictor</title>
<link rel="manifest" id="manifest-placeholder"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1a7a3c;--green-light:#e8f5ee;--green-mid:#2ea055;
  --bg:#f7f8f5;--card:#fff;--text:#1a1a1a;--muted:#666;--border:#e0e0e0;
  --blue:#1a6bc4;--red:#c41a1a;--info-bg:#e8f1fb;--info-text:#1a6bc4;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111;--card:#1e1e1e;--text:#f0f0f0;--muted:#999;--border:#333;
    --green-light:#0d3320;--info-bg:#0d1f3c;--info-text:#5a9fe8}
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;overscroll-behavior:none}
body{overflow-y:auto;-webkit-overflow-scrolling:touch}
h1,h2,h3,.condensed{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-weight:700;letter-spacing:.04em}
.app{max-width:500px;margin:0 auto;padding:0 0 80px}
.header{text-align:center;padding:16px 16px 12px;background:var(--green);color:#fff;position:sticky;top:0;z-index:10}
.header h1{font-size:24px;letter-spacing:.1em;text-transform:uppercase}
.header p{font-size:11px;opacity:.8;margin-top:2px}
.body{padding:12px}
.teams-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;margin-bottom:12px;align-items:start}
.vs{font-size:18px;font-weight:700;color:var(--muted);padding-top:28px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.card-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.label-home{color:var(--blue)}
.label-away{color:var(--red)}
input[type=text],input[type=number]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;font-weight:600;outline:none}
input[type=text]{font-size:15px;margin-bottom:10px;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;letter-spacing:.04em}
input[type=number]{text-align:center;font-size:13px}
input:focus{border-color:var(--green)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.stat-field label{display:block;font-size:10px;color:var(--muted);margin-bottom:3px;text-align:center}
.form-label{font-size:10px;color:var(--muted);margin-bottom:5px}
.form-btns{display:flex;gap:4px}
.fbtn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--muted);transition:all .15s}
.fbtn.w{background:var(--green);color:#fff;border-color:var(--green)}
.fbtn.d{background:#888;color:#fff;border-color:#888}
.fbtn.l{background:var(--red);color:#fff;border-color:var(--red)}
.predict-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;margin-bottom:10px;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;-webkit-appearance:none}
.predict-btn:active{opacity:.85}
.ai-btn{width:100%;padding:11px;background:transparent;color:var(--blue);border:1px solid var(--blue);border-radius:10px;font-size:15px;font-weight:700;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;-webkit-appearance:none}
.ai-btn:disabled{opacity:.4;cursor:not-allowed}
.results{margin-top:14px}
.best-tip{background:var(--green-light);border:2px solid var(--green);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.best-tip-inner .lbl{font-size:10px;color:var(--green);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.best-tip-inner .val{font-size:20px;font-weight:700;color:var(--green);font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif}
.best-tip-pct{font-size:30px;font-weight:700;color:var(--green);font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif}
.rsec{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.rtitle{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.outcome-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ocard{border-radius:8px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.ocard.winner{border-color:var(--green);background:var(--green-light)}
.ocard .olabel{font-size:10px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ocard .opct{font-size:22px;font-weight:700;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif}
.ocard.winner .opct{color:var(--green)}
.obar{height:3px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden}
.obar-fill{height:100%;border-radius:2px}
.cbadge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;margin-top:4px}
.ch{background:#e8f5ee;color:#1a7a3c}.cm{background:#fff8e1;color:#8a6a00}.cl{background:#fce8e8;color:#a32d2d}
@media(prefers-color-scheme:dark){.ch{background:#0d3320;color:#4caf7a}.cm{background:#2a2000;color:#f5c842}.cl{background:#2a0a0a;color:#f08080}}
.xg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.xg-name{font-size:12px;font-weight:600;min-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.xg-bar-wrap{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.xg-bar-fill{height:100%;border-radius:4px}
.xg-val{font-size:13px;font-weight:600;min-width:32px;text-align:right}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.spill{background:var(--bg);border-radius:8px;padding:8px;text-align:center;border:1px solid var(--border)}
.spill.top{border-color:var(--green);background:var(--green-light)}
.spill .sv{font-size:17px;font-weight:700;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif}
.spill .sp{font-size:10px;color:var(--muted);margin-top:1px}
.metrics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.mcard{background:var(--bg);border-radius:8px;padding:10px 12px}
.mval{font-size:21px;font-weight:700;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif}
.mname{font-size:11px;color:var(--muted);margin-top:2px}
.ai-box{background:var(--info-bg);border:1px solid var(--blue);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:13px;line-height:1.7;color:var(--text)}
.ai-box-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--info-text);margin-bottom:8px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.disclaimer{font-size:10px;color:var(--muted);text-align:center;padding:12px 16px;border-top:1px solid var(--border);margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Match Predictor</h1>
    <p>Dixon-Coles · Form weighting · AI insight</p>
  </div>
  <div class="body">
    <div class="teams-wrap">
      <div class="card">
        <div class="card-label label-home">Home</div>
        <input type="text" id="t1name" placeholder="Team name" value="Arsenal"/>
        <div class="stat-grid">
          <div class="stat-field"><label>Scored/g</label><input type="number" id="t1s" min="0" step="0.1" value="2.1"/></div>
          <div class="stat-field"><label>Conceded/g</label><input type="number" id="t1c" min="0" step="0.1" value="0.9"/></div>
          <div class="stat-field"><label>Games</label><input type="number" id="t1g" min="1" step="1" value="28"/></div>
        </div>
        <div class="form-label">Last 5 (tap to change)</div>
        <div class="form-btns" id="t1form"></div>
      </div>
      <div class="vs">VS</div>
      <div class="card">
        <div class="card-label label-away">Away</div>
        <input type="text" id="t2name" placeholder="Team name" value="Chelsea"/>
        <div class="stat-grid">
          <div class="stat-field"><label>Scored/g</label><input type="number" id="t2s" min="0" step="0.1" value="1.5"/></div>
          <div class="stat-field"><label>Conceded/g</label><input type="number" id="t2c" min="0" step="0.1" value="1.2"/></div>
          <div class="stat-field"><label>Games</label><input type="number" id="t2g" min="1" step="1" value="28"/></div>
        </div>
        <div class="form-label">Last 5 (tap to change)</div>
        <div class="form-btns" id="t2form"></div>
      </div>
    </div>

    <button class="predict-btn" onclick="runPrediction()">Predict match</button>
    <button class="ai-btn" id="aiBtn" onclick="getAIInsight()" disabled>AI tactical insight</button>
    <div id="results"></div>
    <div class="disclaimer">Statistical model for entertainment only. Gamble responsibly.</div>
  </div>
</div>

<script>
const t1form=['W','D','W','W','L'];
const t2form=['L','W','D','W','W'];
let lastPrediction=null;

function buildForm(id,arr,idx){
  const c=document.getElementById(id);c.innerHTML='';
  arr.forEach((r,i)=>{
    const b=document.createElement('button');
    b.className='fbtn '+(r==='W'?'w':r==='D'?'d':'l');
    b.textContent=r;
    b.onclick=()=>{const a=idx===1?t1form:t2form;a[i]=a[i]==='W'?'D':a[i]==='D'?'L':'W';buildForm(id,a,idx)};
    c.appendChild(b);
  });
}
buildForm('t1form',t1form,1);
buildForm('t2form',t2form,2);

function poisson(lam,k){let r=Math.exp(-lam);for(let i=1;i<=k;i++)r*=lam/i;return r}
function dcRho(i,j,l1,l2,rho){
  if(i===0&&j===0)return 1-l1*l2*rho;
  if(i===0&&j===1)return 1+l1*rho;
  if(i===1&&j===0)return 1+l2*rho;
  if(i===1&&j===1)return 1-rho;
  return 1;
}
function formWeight(arr){
  const w=[.6,.7,.8,.9,1];let s=0,t=0;
  arr.forEach((r,i)=>{s+=w[i]*(r==='W'?1:r==='D'?.4:0);t+=w[i]});
  return s/t;
}
function conf(p){return p>=.65?'<span class="cbadge ch">High</span>':p>=.45?'<span class="cbadge cm">Medium</span>':'<span class="cbadge cl">Low</span>'}

function runPrediction(){
  const t1s=parseFloat(document.getElementById('t1s').value)||0;
  const t1c=parseFloat(document.getElementById('t1c').value)||0;
  const t2s=parseFloat(document.getElementById('t2s').value)||0;
  const t2c=parseFloat(document.getElementById('t2c').value)||0;
  const t1n=document.getElementById('t1name').value.trim()||'Home';
  const t2n=document.getElementById('t2name').value.trim()||'Away';
  const fw1=formWeight(t1form),fw2=formWeight(t2form);
  const fb1=.85+fw1*.3,fb2=.85+fw2*.3;
  const l1=(t1s+t2c)/2*1.12*fb1;
  const l2=(t2s+t1c)/2*fb2;
  const rho=-.13,mg=8;
  const probs={};let w1=0,dr=0,w2=0;
  for(let i=0;i<mg;i++)for(let j=0;j<mg;j++){
    const p=poisson(l1,i)*poisson(l2,j)*dcRho(i,j,l1,l2,rho);
    probs[`${i}-${j}`]=p;
    if(i>j)w1+=p;else if(i===j)dr+=p;else w2+=p;
  }
  const tot=w1+dr+w2;w1/=tot;dr/=tot;w2/=tot;
  const btts=(1-poisson(l1,0))*(1-poisson(l2,0));
  let o25=0,o35=0;
  for(let i=0;i<mg;i++)for(let j=0;j<mg;j++){
    if(i+j>2)o25+=(probs[`${i}-${j}`]||0);
    if(i+j>3)o35+=(probs[`${i}-${j}`]||0);
  }
  o25/=tot;o35/=tot;
  const sorted=Object.entries(probs).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const tips={[`${t1n} win`]:w1,'Draw':dr,[`${t2n} win`]:w2,'Over 2.5':o25,'Both score':btts};
  const best=Object.entries(tips).sort((a,b)=>b[1]-a[1])[0];
  lastPrediction={t1n,t2n,l1,l2,w1,dr,w2,btts,o25,o35,sorted,best,fw1,fw2};
  document.getElementById('aiBtn').disabled=false;
  renderResults(lastPrediction);
}

function renderResults(d){
  const mx=Math.max(d.l1,d.l2,1);
  const win=d.w1>d.dr&&d.w1>d.w2?'t1':d.w2>d.dr&&d.w2>d.w1?'t2':'draw';
  document.getElementById('results').innerHTML=`
<div class="results">
  <div class="best-tip">
    <div class="best-tip-inner"><div class="lbl">Best tip</div><div class="val">${d.best[0]}</div></div>
    <div class="best-tip-pct">${(d.best[1]*100).toFixed(1)}%</div>
  </div>
  <div class="rsec">
    <div class="rtitle">Match outcome</div>
    <div class="outcome-grid">
      <div class="ocard ${win==='t1'?'winner':''}">
        <div class="olabel">${d.t1n}</div>
        <div class="opct">${(d.w1*100).toFixed(1)}%</div>
        <div class="obar"><div class="obar-fill" style="width:${(d.w1*100).toFixed(1)}%;background:var(--blue)"></div></div>
        ${conf(d.w1)}
      </div>
      <div class="ocard ${win==='draw'?'winner':''}">
        <div class="olabel">Draw</div>
        <div class="opct">${(d.dr*100).toFixed(1)}%</div>
        <div class="obar"><div class="obar-fill" style="width:${(d.dr*100).toFixed(1)}%;background:#888"></div></div>
        ${conf(d.dr)}
      </div>
      <div class="ocard ${win==='t2'?'winner':''}">
        <div class="olabel">${d.t2n}</div>
        <div class="opct">${(d.w2*100).toFixed(1)}%</div>
        <div class="obar"><div class="obar-fill" style="width:${(d.w2*100).toFixed(1)}%;background:var(--red)"></div></div>
        ${conf(d.w2)}
      </div>
    </div>
  </div>
  <div class="rsec">
    <div class="rtitle">Expected goals (xG)</div>
    <div class="xg-row">
      <span class="xg-name" style="color:var(--blue)">${d.t1n}</span>
      <div class="xg-bar-wrap"><div class="xg-bar-fill" style="width:${Math.min(100,d.l1/mx*100).toFixed(1)}%;background:var(--blue)"></div></div>
      <span class="xg-val" style="color:var(--blue)">${d.l1.toFixed(2)}</span>
    </div>
    <div class="xg-row">
      <span class="xg-name" style="color:var(--red)">${d.t2n}</span>
      <div class="xg-bar-wrap"><div class="xg-bar-fill" style="width:${Math.min(100,d.l2/mx*100).toFixed(1)}%;background:var(--red)"></div></div>
      <span class="xg-val" style="color:var(--red)">${d.l2.toFixed(2)}</span>
    </div>
  </div>
  <div class="rsec">
    <div class="rtitle">Top scorelines</div>
    <div class="score-grid">
      ${d.sorted.map(([s,p],i)=>`<div class="spill ${i===0?'top':''}"><div class="sv">${s.replace('-',' – ')}</div><div class="sp">${(p*100).toFixed(1)}%</div></div>`).join('')}
    </div>
  </div>
  <div class="rsec">
    <div class="rtitle">Markets</div>
    <div class="metrics-grid">
      <div class="mcard"><div class="mval">${(d.o25*100).toFixed(1)}%</div><div class="mname">Over 2.5 goals ${conf(d.o25)}</div></div>
      <div class="mcard"><div class="mval">${((1-d.o25)*100).toFixed(1)}%</div><div class="mname">Under 2.5 goals ${conf(1-d.o25)}</div></div>
      <div class="mcard"><div class="mval">${(d.o35*100).toFixed(1)}%</div><div class="mname">Over 3.5 goals ${conf(d.o35)}</div></div>
      <div class="mcard"><div class="mval">${(d.btts*100).toFixed(1)}%</div><div class="mname">Both teams score ${conf(d.btts)}</div></div>
      <div class="mcard"><div class="mval">${(d.l1+d.l2).toFixed(2)}</div><div class="mname">Total xG</div></div>
      <div class="mcard"><div class="mval">${((d.fw1+d.fw2)/2*100).toFixed(0)}%</div><div class="mname">Avg form score</div></div>
    </div>
  </div>
  <div id="ai-box"></div>
</div>`;
}

async function getAIInsight(){
  if(!lastPrediction)return;
  const btn=document.getElementById('aiBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Analysing...';
  document.getElementById('ai-box').innerHTML='';
  const d=lastPrediction;
  const prompt=`You are a football analytics expert. Given these match prediction stats, write a sharp 3-sentence tactical insight for bettors. Be concise, specific, and analytical.\n\nMatch: ${d.t1n} (home) vs ${d.t2n} (away)\nxG: ${d.t1n} ${d.l1.toFixed(2)} | ${d.t2n} ${d.l2.toFixed(2)}\nOutcomes: ${d.t1n} win ${(d.w1*100).toFixed(1)}% | Draw ${(d.dr*100).toFixed(1)}% | ${d.t2n} win ${(d.w2*100).toFixed(1)}%\nForm score: ${d.t1n} ${d.fw1.toFixed(2)} | ${d.t2n} ${d.fw2.toFixed(2)}\nOver 2.5: ${(d.o25*100).toFixed(1)}% | BTTS: ${(d.btts*100).toFixed(1)}%\nBest tip: ${d.best[0]} at ${(d.best[1]*100).toFixed(1)}%\n\nFocus on: key statistical edge, form differential impact, and one actionable market recommendation.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=data.content?.map(c=>c.text||'').join('')||'No insight returned.';
    document.getElementById('ai-box').innerHTML=`<div class="ai-box"><div class="ai-box-title">AI tactical insight</div>${text.replace(/\n/g,'<br>')}</div>`;
  }catch(e){
    document.getElementById('ai-box').innerHTML=`<div class="ai-box" style="color:var(--red)">Could not load AI insight.</div>`;
  }
  btn.disabled=false;btn.innerHTML='Refresh AI insight';
}

runPrediction();
</script>
</body>
</html>
